<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý Yêu cầu Mua Hàng - Diệu Tướng Am</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #a41010 url('image/background.jpg') no-repeat center center / cover;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
    }
    header { text-align:center; padding: 30px 20px 20px; background: rgba(0,0,0,0.6); }
    header h1 { color: #fff; font-size: 2rem; margin-bottom: 6px; }
    header p  { color: rgba(255,255,255,0.85); font-size: 1rem; }
    .header-meta { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:14px; flex-wrap:wrap; }
    .back-btn {
      display:inline-block; padding:10px 24px;
      background:rgba(255,255,255,0.15); color:white;
      border:1px solid #d4af37; border-radius:50px;
      text-decoration:none; font-weight:500; transition:all .25s;
    }
    .back-btn:hover { background:#d4af37; color:#1a0f00; }
    .role-badge { padding:6px 18px; border-radius:50px; font-size:.85rem; font-weight:700; letter-spacing:.5px; }
    .role-badge.r1 { background:#d4af37; color:#1a0f00; }
    .role-badge.r2 { background:#fff; color:#a41010; }

    .table-wrap { overflow-x:auto; margin:24px 3% 60px; }
    table { width:100%; border-collapse:collapse; background:#fff; border:2px solid #a41010; box-shadow:0 4px 20px rgba(0,0,0,0.4); border-radius:10px; overflow:hidden; }
    th { background:#a41010; color:#fff; font-weight:700; padding:13px 10px; text-align:left; white-space:nowrap; font-size:.88rem; }
    td { padding:11px 10px; border:1px solid #e0c0c0; color:#1a0000; vertical-align:middle; font-size:.9rem; }
    tr:nth-child(even) td { background:#fdf5f5; }
    tr:hover td { background:#ffeaea; transition:background .15s; }

    .status-pill { display:inline-block; padding:4px 12px; border-radius:50px; font-size:.8rem; font-weight:700; white-space:nowrap; }
    .pill-duyet   { background:#d4edda; color:#155724; }
    .pill-tuchoi  { background:#f8d7da; color:#721c24; }
    .pill-dangmua { background:#fff3cd; color:#856404; }
    .pill-damua   { background:#cce5ff; color:#004085; }
    .pill-empty   { background:#eee;    color:#888; }

    select { padding:6px 10px; border:1.5px solid #a41010; border-radius:8px; background:#fff; color:#000; cursor:pointer; font-size:.88rem; transition:border-color .2s, box-shadow .2s; }
    select:focus   { outline:none; border-color:#d4af37; box-shadow:0 0 0 3px #d4af3744; }
    select:disabled{ opacity:.5; cursor:not-allowed; }

    .img-cell { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
    .img-link {
      display:inline-flex; align-items:center; gap:5px;
      color:#a41010; font-size:.85rem; font-weight:600;
      text-decoration:none; background:#ffeaea;
      border:1px solid #e0a0a0; border-radius:6px;
      padding:5px 10px; transition:background .2s;
      max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .img-link:hover { background:#ffd0d0; text-decoration:underline; }
    .no-img { color:#aaa; font-size:.8rem; font-style:italic; }
    .up-btn {
      background:#a41010; color:#fff; padding:6px 12px;
      border:none; border-radius:8px; cursor:pointer;
      font-size:.8rem; font-weight:700;
      transition:background .2s, transform .1s; display:inline-block;
    }
    .up-btn:hover { background:#7a0b0b; transform:translateY(-1px); }

    .loading, .msg-error { text-align:center; padding:60px 20px; font-size:1.3rem; }
    .msg-error { color:#ffcccc; }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:2000; justify-content:center; align-items:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:16px; padding:32px 28px; width:92%; max-width:480px; text-align:center; color:#1a0000; box-shadow:0 20px 60px rgba(0,0,0,0.6); animation:popIn .2s ease; }
    @keyframes popIn { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-box h2 { color:#a41010; margin-bottom:14px; font-size:1.3rem; }
    .modal-box input { width:100%; padding:12px 14px; border:1.5px solid #ccc; border-radius:10px; font-size:.95rem; margin:10px 0 20px; transition:border-color .2s; }
    .modal-box input:focus { outline:none; border-color:#a41010; }
    .modal-actions { display:flex; gap:12px; justify-content:center; }
    .modal-save   { padding:11px 28px; background:#a41010; color:#fff; border:none; border-radius:50px; cursor:pointer; font-weight:700; }
    .modal-save:hover { background:#7a0b0b; }
    .modal-cancel { padding:11px 28px; background:#eee; color:#333; border:none; border-radius:50px; cursor:pointer; }

    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
      background:#1a0000; color:#fff; padding:12px 28px; border-radius:50px;
      font-weight:600; font-size:.95rem; z-index:9999;
      transition:transform .35s cubic-bezier(.175,.885,.32,1.275);
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }

    @media (max-width:768px) {
      header h1 { font-size:1.4rem; }
      .table-wrap { margin:16px 1% 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Quản lý Yêu cầu Mua Hàng – Diệu Tướng Am</h1>
  <p>Danh sách đơn hàng từ khách hàng</p>
  <div class="header-meta">
    <a href="home.html" class="back-btn">← Quay về trang chủ</a>
    <span id="roleBadge" class="role-badge"></span>
  </div>
</header>

<div id="loadingMsg" class="loading">⏳ Đang tải dữ liệu…</div>
<div id="errorMsg" class="msg-error" style="display:none;"></div>
<div class="table-wrap" id="tableWrap" style="display:none;">
  <table id="mainTable"></table>
</div>

<div class="modal-overlay" id="imageModal">
  <div class="modal-box">
    <h2>📷 Cập nhật hình ảnh</h2>
    <p style="font-size:.9rem;color:#555;margin-bottom:4px;">Dán link Google Drive bên dưới:</p>
    <input type="text" id="newImageUrl" placeholder="https://drive.google.com/file/d/...">
    <div class="modal-actions">
      <button class="modal-save" onclick="saveImage()">Lưu</button>
      <button class="modal-cancel" onclick="closeModal()">Hủy</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SHEET_ID = '1zfrE-ijCfdXvbdS3b_2ye1WMMjmCMyxtA2_ZHpQEhJw';
const GID      = '1555363511';
const API_URL  = 'https://script.google.com/macros/s/AKfycby2Zc3inC7xAf9wU1xMlXwvdf2maxbkC6Hzkj7oleMNpk034-bGMQrC8dxiWuyTtm0-VQ/exec';

const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
const userEmail  = (localStorage.getItem('userEmail') || '').trim().toLowerCase();

function clearSession() {
  localStorage.removeItem('userLoggedIn');
  localStorage.removeItem('userName');
  localStorage.removeItem('userEmail');
}

const level1Emails = ['thietke@dieutuongam.com'];
const level2Emails = ['ptsp@dieutuongam.com','it@dieutuongam.com','lehuyen@dieutuongam.com','truongkhuong@dieutuongam.com','hongtuyet@dieutuongam.com'];

let role = 0;
if (!isLoggedIn || !userEmail) {
  clearSession();
  alert('Vui lòng đăng nhập để tiếp tục.');
  window.location.href = 'login.html';
} else if (level1Emails.includes(userEmail)) {
  role = 1;
} else if (level2Emails.includes(userEmail)) {
  role = 2;
} else {
  alert('Tài khoản không có quyền truy cập trang này.');
  window.location.href = 'home.html';
}

const badge = document.getElementById('roleBadge');
if (role === 1) { badge.textContent = '🎨 Thiết kế (Level 1)'; badge.classList.add('r1'); }
if (role === 2) { badge.textContent = '🛒 Mua hàng (Level 2)'; badge.classList.add('r2'); }

// ── Cấu hình cột — minWidth áp dụng cho th/td ───
const COLS_COMMON = [
  { idx:0, label:'Thời gian',     minWidth:'140px' },
  { idx:1, label:'Email',         minWidth:'220px' },
  { idx:2, label:'Họ và Tên',     minWidth:'220px' },
  { idx:3, label:'Số điện thoại', minWidth:'220px' },
  { idx:4, label:'Nội dung 1',    minWidth:'500px' },
  { idx:5, label:'Nội dung 2',    minWidth:'500px' },
  { idx:6, label:'Nội dung 3',    minWidth:'500px' },
  { idx:7, label:'Nội dung 4',    minWidth:'500px' },
];
const COL_HINH = { idx:8,  label:'Hình ảnh',    isUpBtn:  true, colSheet:9,  editable:{1:true,  2:false} };
const COL_J    = { idx:9,  label:'Trạng thái 1', isSelect: true, colSheet:10, editable:{1:false, 2:true}, options:['','DUYỆT','TỪ CHỐI'] };
const COL_K    = { idx:10, label:'Mua hàng',     isSelect: true, colSheet:11, editable:{1:false, 2:true}, options:['','ĐANG MUA','ĐÃ MUA'] };
const COL_L    = { idx:11, label:'Trạng thái 2', isSelect: true, colSheet:12, editable:{1:false, 2:true}, options:['','DUYỆT','TỪ CHỐI'] };
const ALL_COLS = [...COLS_COMMON, COL_HINH, COL_J, COL_K, COL_L];

const READ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

fetch(READ_URL)
  .then(r => r.text())
  .then(text => {
    const json = text.substring(text.indexOf('(') + 1, text.lastIndexOf(')'));
    buildTable(JSON.parse(json).table.rows || []);
  })
  .catch(() => {
    document.getElementById('loadingMsg').style.display = 'none';
    const el = document.getElementById('errorMsg');
    el.textContent = '❌ Không tải được dữ liệu. Kiểm tra Sheet đã publish public chưa.';
    el.style.display = 'block';
  });

function imgLinkHtml(val) {
  if (!val) return '<span class="no-img">Chưa có ảnh</span>';
  return `<a href="${val}" target="_blank" class="img-link" title="${val}">🔗 Xem hình ảnh</a>`;
}

function buildTable(rows) {
  document.getElementById('loadingMsg').style.display = 'none';
  if (rows.length === 0) {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Chưa có yêu cầu nào.';
    el.style.display = 'block';
    return;
  }
  const table = document.getElementById('mainTable');

  // Header — áp dụng min-width từ config
  let thead = '<thead><tr>';
  ALL_COLS.forEach(c => {
    const style = c.minWidth ? ` style="min-width:${c.minWidth}"` : '';
    thead += `<th${style}>${c.label}</th>`;
  });
  thead += '</tr></thead>';

  // Body — áp dụng min-width cho td cùng cột
  let tbody = '<tbody>';
  rows.forEach((row, i) => {
    const cells    = row.c || [];
    const sheetRow = i + 2;
    tbody += `<tr data-row="${sheetRow}">`;
    ALL_COLS.forEach(col => {
      const cell  = cells[col.idx];
      const val   = cell ? String(cell.v ?? cell.f ?? '') : '';
      const style = col.minWidth ? ` style="min-width:${col.minWidth}"` : '';

      if (col.isUpBtn) {
        const canEdit = col.editable[role] === true;
        tbody += `<td${style}><div class="img-cell">
          ${imgLinkHtml(val)}
          ${canEdit ? `<button class="up-btn" onclick="openModal(${sheetRow})">📷 UP HÌNH</button>` : ''}
        </div></td>`;
      } else if (col.isSelect) {
        const canEdit = col.editable[role] === true;
        if (canEdit) {
          let sel = `<select onchange="updateCell(this,${sheetRow},${col.colSheet})">`;
          col.options.forEach(opt => {
            sel += `<option value="${opt}" ${val===opt?'selected':''}>${opt||'— Chưa chọn —'}</option>`;
          });
          sel += '</select>';
          tbody += `<td${style}>${sel}</td>`;
        } else {
          tbody += `<td${style}>${statusPill(val)}</td>`;
        }
      } else {
        tbody += `<td${style}>${val}</td>`;
      }
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
  document.getElementById('tableWrap').style.display = 'block';
}

function statusPill(val) {
  if (!val) return '<span class="status-pill pill-empty">—</span>';
  const map = { 'DUYỆT':'pill-duyet','TỪ CHỐI':'pill-tuchoi','ĐANG MUA':'pill-dangmua','ĐÃ MUA':'pill-damua' };
  return `<span class="status-pill ${map[val]||'pill-empty'}">${val}</span>`;
}

let _modalRow = null;
function openModal(row) {
  _modalRow = row;
  document.getElementById('newImageUrl').value = '';
  const tr = document.querySelector(`tr[data-row="${row}"]`);
  if (tr) {
    const link = tr.querySelector('.img-link');
    if (link) document.getElementById('newImageUrl').value = link.href;
  }
  document.getElementById('imageModal').classList.add('open');
}
function closeModal() {
  document.getElementById('imageModal').classList.remove('open');
}

async function saveImage() {
  const link = document.getElementById('newImageUrl').value.trim();
  if (!link) { showToast('⚠️ Vui lòng dán link Drive!'); return; }
  const success = await postToSheet(_modalRow, 9, link);
  if (success) {
    const tr = document.querySelector(`tr[data-row="${_modalRow}"]`);
    if (tr) {
      const imgCell = tr.querySelector('.img-cell');
      if (imgCell) {
        imgCell.querySelectorAll('.img-link, .no-img').forEach(el => el.remove());
        const a = document.createElement('a');
        a.href = link; a.target = '_blank'; a.className = 'img-link'; a.title = link;
        a.innerHTML = '🔗 Xem hình ảnh';
        imgCell.insertBefore(a, imgCell.firstChild);
      }
    }
    showToast('✅ Đã cập nhật hình ảnh!');
    closeModal();
  }
}

async function updateCell(selectEl, sheetRow, colSheet) {
  const value   = selectEl.value;
  const prevIdx = selectEl.dataset.prevIdx !== undefined ? selectEl.dataset.prevIdx : selectEl.selectedIndex;
  if (!value) return;
  selectEl.disabled = true;
  const success = await postToSheet(sheetRow, colSheet, value);
  selectEl.disabled = false;
  if (success) {
    selectEl.dataset.prevIdx = selectEl.selectedIndex;
    showToast('✅ Đã cập nhật: "' + value + '"');
  } else {
    selectEl.selectedIndex = Number(prevIdx);
  }
}

async function postToSheet(row, col, value) {
  if (!API_URL || API_URL.includes('YOUR_SCRIPT_ID')) {
    showToast('⚠️ Chưa cấu hình API_URL!');
    return false;
  }
  try {
    await fetch(API_URL, {
      method:'POST', mode:'no-cors', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ row, col, value })
    });
    return true;
  } catch(err) {
    showToast('❌ Lỗi kết nối: ' + err.message);
    return false;
  }
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('imageModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
